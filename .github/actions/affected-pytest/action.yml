name: Affected Pytest
description: >-
  Run only the pytest tests a PR's changed lines impact (pytest-impacted);
  full suite on non-PR events.

inputs:
  impacted-module:
    required: true
    description: >-
      --impacted-module value. Src-layout: full path with src/ prefix
      (e.g. src/testing_service). Flat-layout: package name (e.g. minitap).
  tests-dir:
    required: false
    default: tests
    description: "Tests directory (--impacted-tests-dir). Empty to omit."
  base-ref:
    required: false
    default: main
    description: "Branch the PR is diffed against to select affected tests."
  pytest-args:
    required: false
    default: ""
    description: 'Args appended to every pytest run, e.g. -m "not ios_simulator".'
  pre-test:
    required: false
    default: ""
    description: "Shell command run before pytest, e.g. cp .env.example .env."

runs:
  using: "composite"
  steps:
    - name: Run full test suite (non-PR safety net)
      if: github.event_name != 'pull_request'
      shell: bash
      run: |
        set -euo pipefail
        echo "::notice::Running FULL pytest suite (event: ${{ github.event_name }})"
        ${{ inputs.pre-test || 'true' }}
        uv run pytest ${{ inputs.pytest-args }}

    - name: Run affected tests (pull request)
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        set -euo pipefail
        BASE_REF="${{ inputs.base-ref }}"
        echo "::notice::Running AFFECTED pytest selection (pytest-impacted, base=${BASE_REF}, module=${{ inputs.impacted-module }})"

        # checkout may be shallow; ensure the base ref is present for branch-mode diff.
        git fetch --no-tags origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}" 2>/dev/null \
          || git fetch --no-tags origin "${BASE_REF}"

        TESTS_DIR_ARG=""
        if [ -n "${{ inputs.tests-dir }}" ]; then
          TESTS_DIR_ARG="--impacted-tests-dir=${{ inputs.tests-dir }}"
        fi

        ${{ inputs.pre-test || 'true' }}

        # pytest-impacted deselects unaffected tests; it force-runs ALL tests when
        # uv.lock / pyproject.toml / a conftest.py changed (dep-file & pytest strategies).
        # Exit code 5 = "no tests collected" (nothing affected) -> treat as success.
        set +e
        uv run pytest \
          --impacted \
          --impacted-module="${{ inputs.impacted-module }}" \
          --impacted-git-mode=branch \
          --impacted-base-branch="origin/${BASE_REF}" \
          $TESTS_DIR_ARG \
          ${{ inputs.pytest-args }}
        code=$?
        set -e
        if [ "$code" -eq 5 ]; then
          echo "::notice::No affected tests for this change (pytest exit 5) — passing."
          exit 0
        fi
        exit "$code"
